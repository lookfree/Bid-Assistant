# 开发环境（mbp）：在本机浏览器经 *.localhost 访问（*.localhost 浏览器自动解析到 127.0.0.1）。
# 测试/生产（aliyun）：把 server_name 换成真实域名并挂 443。
# C 端用户前端。前端用相对路径调 API（NEXT_PUBLIC_API_BASE_URL 为空 = 同源），
# 故在此把 /api 与 /auth 转发给 App API，其余走 web SSR。
server {
  listen 80 default_server;
  server_name app.localhost;
  client_max_body_size 5m; # 文件走 MinIO 直传，这里仅 API/SSR
  location /api/ {
    proxy_pass http://api:8080;
    include /etc/nginx/conf.d/_proxy.inc;
  }
  location /auth/ {
    proxy_pass http://api:8080;
    include /etc/nginx/conf.d/_proxy.inc;
  }
  location / {
    proxy_pass http://web:3000;
    include /etc/nginx/conf.d/_proxy.inc;
  }
}

# 运营管理后台（后续加 IP 白名单 allow/deny）。/admin-api 同源转发给 App API，其余走 admin SSR。
server {
  listen 80;
  server_name admin.localhost;
  location /admin-api/ {
    proxy_pass http://api:8080;
    include /etc/nginx/conf.d/_proxy.inc;
  }
  location / {
    proxy_pass http://admin:3001;
    include /etc/nginx/conf.d/_proxy.inc;
  }
}

# App API
server {
  listen 80;
  server_name api.localhost;
  location / {
    proxy_pass http://api:8080;
    include /etc/nginx/conf.d/_proxy.inc;
  }
}
